name: Step Types

on: 
  workflow_dispatch:

jobs:
  first-job:
    runs-on: ubuntu-24.04
    steps:
      - run : echo "inline bach script"

  second-job:
    runs-on: ubuntu-24.04
    steps:
      - run: print "using python script"
        shell: python
  
  third-job: 
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/hello-world-javascript@v1
        with:
          who-to-greet: 'JavaScript Action from the Marketplace'